name: Bitween UI CI/CD
run-name: Run-${{ github.ref_name }}-${{ github.run_number }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# contents: write → tag job. packages: write is kept for safety but is not
# required for this Docker Hub + ChartMuseum setup (only needed if you publish
# the image or chart to GHCR).
permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch' }}
    uses: simplify9/.github/.github/workflows/reusable-build-and-publish-artifacts.yml@main
    with:
      major-version: '8'
      minor-version: '1'
      dockerfile-path: './Dockerfile'
      docker-context: '.'
      docker-platforms: 'linux/amd64'

      chart-name: 'bitweenui'                # must match Chart.yaml name:
      chart-path: './chart'

      #(ChartMuseum)
      chart-publish-method: 'chartmuseum'
      chart-repo-url: 'https://charts.sf9.io'

      # Docker image stays on Docker Hub
      container-registry: 'docker.io'
      image-name: 'simplify9/bitweenui'
    secrets:
      # Docker image push credentials
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ChartMuseum credentials (same purpose as old CmUser/CmPassword)
      chartmuseum-username: ${{ secrets.CM_USER }}
      chartmuseum-password: ${{ secrets.CM_PASSWORD }}

      github-token: ${{ secrets.GITHUB_TOKEN }}
