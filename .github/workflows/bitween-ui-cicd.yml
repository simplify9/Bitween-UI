name: Bitween UI CI/CD
run-name: Run-${{ github.ref_name }}-${{ github.run_number }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  deploy-main:
    if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch' }}
    uses: simplify9/.github/.github/workflows/reusable-build-and-publish-artifacts.yml@main
    with:
      major-version: '8'
      minor-version: '1'

      dockerfile-path: './Dockerfile'
      docker-context: '.'
      docker-platforms: 'linux/amd64'

      chart-name: 'bitweenui'
      chart-path: './chart'

      # Keep Docker image publishing as-is
      container-registry: 'docker.io'
      image-name: 'simplify9/bitweenui'

    secrets:
      # Docker image push credentials
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

      # GitHub token used by the reusable workflow for tagging and GHCR OCI chart publishing
      github-token: ${{ secrets.GITHUB_TOKEN }}