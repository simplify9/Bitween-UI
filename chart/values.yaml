replicaCount: 1

image:
  repo: 'docker.io/simplify9'

probes:
  enabled: false

service:
  # type is consumed by templates/NOTES.txt (contains "…" .Values.service.type);
  # templates/service.yaml is always ClusterIP, so keep these aligned.
  type: ClusterIP
  port: 80

# North-south routing. The chart defaults to ingress-nginx (below). Set
# gateway.enabled=true to switch to Gateway API (HTTPRoute) instead — this
# automatically suppresses the Ingress resource.
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
    # kubernetes.io/tls-acme: "true"
  tlsSecret: ""

# Gateway API (HTTPRoute). Disabled by default — the chart renders nothing
# Gateway-API-related unless gateway.enabled is set to true at deploy time.
# When enabled, the Ingress above is suppressed and routing works exactly like
# the Gateway API chart.
gateway:
  enabled: false
  parentRefs:
    - name: public-gateway
      namespace: s9-dev-edge
      sectionName: https-wildcard-sf9-io
  hostnames:
    - s9genericapp.sf9.io
  routes:
    - path: "/"
      pathType: PathPrefix
      # Optional route-level timeouts (Gateway API v1.1+ standard channel).
      # Prevents slow backends from holding connections indefinitely.
      # Example:
      # timeout:
      #   request: "30s"         # Total client-to-backend request timeout
      #   backendRequest: "10s"  # Single backend attempt timeout
      backendRef:
        name: ""
        port: 80
